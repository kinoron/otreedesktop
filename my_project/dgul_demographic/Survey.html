{{ block title }}
    実験終了後アンケート
{{ endblock }}
{{ block content }}

<style>

    body {
        font-family: "Meiryo", sans-serif;
        font-size: larger;
    }

    .box {
    position: relative;
    max-width: 1200px;
    margin: 3em auto;
    padding: 1em 1.5em;
    border: 2px solid #2589d0;
    border-radius: 3px;
    }

    .qtitle {
        position: absolute;
        top: -1.9em;
        left: -2px;
        padding: .2em .8em;
        border-radius: 5px 5px 0 0;
        background-color: #2589d0;
        color: #fff;
    }

    #question_body {
        margin-top: 50px;
    }

    .question_label p {
        font-weight: 600;
        font-size: larger;
    }

    #next {
        display: flex;
        justify-content: flex-end;
        margin-top: 100px;
    }

    .otree-btn-next {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 200px;
    margin:0 auto;
    padding: .9em 2em;
    border: none;
    border-radius: 5px;
    background-color: #2589d0;
    color: #fff;
    font-weight: 600;
    font-size: larger;
    content: '結果に進む';
}

    .otree-btn-next::after {
        transform: rotate(45deg);
        width: 20px;
        height: 20px;
        margin-left: 10px;
        border-top: 2px solid #fff;
        border-right: 2px solid #fff;
        content: '';
    }

    .otree-btn-next:hover {
        background-color: #1579c0;
    }

</style>

<div>
    <div class="announcement">
        <p>
            実験お疲れさまでした。<br>
            現在、結果を集計しております。<br>
            その間に、以下のアンケートにご回答ください。
        </p>
    </div>

    <div id="question_body">

        <div id="question_age" class="box">
            <span class="qtitle">設問1</span>
            <div class="question_label">
                <p>あなたの年齢を教えてください。</p>
            </div>
            {{ formfield 'age' }}
        </div>

        <div id="question_gender" class="box">
            <span class="qtitle">設問2</span>
            <div class="question_label">
                <p>あなたの性別を教えてください。</p>
            </div>
            {{ formfield 'gender' }}
        </div>

</div>
        
    
    <div class="announcement">
        <p>
            下の「Next」ボタンを押して次の設問に進んでください。
        </p>
    </div>


    <div id="next">
        {{ next_button }}
    </div>
    

{{ endblock }}
